name: Publish to npm

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      # Trusted Publishing (OIDC) requires npm 11.5.1+; the runner ships npm 10.x.
      #
      # BOOTSTRAP (first publish only): authenticate with the NPM_TOKEN repo
      # secret, because a Trusted Publisher can't be configured on npmjs.com
      # until the package exists. After the first publish lands, configure
      # Trusted Publishing at npmjs.com, revoke the token, and DELETE the `env:`
      # block below — that leaves a pure-OIDC, tokenless publish.
      - name: Publish
        run: npx -y npm@latest publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
